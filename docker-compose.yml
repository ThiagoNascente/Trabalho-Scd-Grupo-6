version: '3.8'

# ==========================================================================
# Ambiente de DESENVOLVIMENTO local (não usar em produção AWS).
# Segredos vêm do arquivo .env (copie de .env.example: `cp .env.example .env`).
# As variáveis com `:?` ABORTAM o `docker compose up` com mensagem clara se
# não estiverem definidas — nenhum segredo fica chumbado aqui.
# ==========================================================================

services:
  postgres:
    image: postgres:15
    container_name: spaceship_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env (copie de .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-authdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: spaceship_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: spaceship_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: spaceship_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: spaceship_auth
    ports:
      - "${AUTH_PORT:-5000}:5000"
      - "${AUTH_GRPC_PORT:-5005}:5005"          # gRPC (item 8) — validação de sessão
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-authdb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env (copie de .env.example)}
      - JwtSettings__Secret=${JWT_SECRET:?defina JWT_SECRET no .env (copie de .env.example)}
      - GRPC_PORT=5005
    depends_on:
      - postgres
    restart: unless-stopped

  game-gateway:
    build:
      context: ./game-gateway
      dockerfile: Dockerfile
    container_name: spaceship_gateway
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET:?defina JWT_SECRET no .env (copie de .env.example)}
      - AUTH_GRPC_URL=auth-service:5005        # valida sessão via gRPC no Auth (item 8)
      - ENGINE1_URL=http://game-engine-1:4001
      - ENGINE2_URL=http://game-engine-2:4002
      - ENGINE3_URL=http://game-engine-3:4003
    depends_on:
      - game-engine-1
      - game-engine-2
      - game-engine-3
    restart: unless-stopped

  # Game Engines (1 por jogo). Mesma imagem, GAME diferente => Particionamento
  # Funcional: derrubar um engine não afeta os outros jogos.
  game-engine-1:
    build:
      context: ./game-engine
      dockerfile: Dockerfile
    container_name: spaceship_engine1
    environment:
      - GAME=jogo1
      - PORT=4001
      - JWT_SECRET=${JWT_SECRET:?defina JWT_SECRET no .env (copie de .env.example)}
      - AUTH_API_URL=http://auth-service:5000/api/auth
      - KAFKA_BROKER=kafka:29092               # publica match-completed (item 4)
      - MATCH_TOPIC=match-completed
    ports:
      - "${ENGINE1_PORT:-4001}:4001"          # Socket.io (relay do gateway)
    depends_on:
      - auth-service
      - kafka
    restart: unless-stopped

  game-engine-2:
    build:
      context: ./game-engine
      dockerfile: Dockerfile
    container_name: spaceship_engine2
    environment:
      - GAME=jogo2
      - PORT=4002
      - JWT_SECRET=${JWT_SECRET:?defina JWT_SECRET no .env (copie de .env.example)}
      - KAFKA_BROKER=kafka:29092               # publica match-completed (item 4)
      - MATCH_TOPIC=match-completed
    ports:
      - "${ENGINE2_PORT:-4002}:4002"
    depends_on:
      - kafka
    restart: unless-stopped

  game-engine-3:
    build:
      context: ./game-engine
      dockerfile: Dockerfile
    container_name: spaceship_engine3
    environment:
      - GAME=jogo3
      - PORT=4003
      - JWT_SECRET=${JWT_SECRET:?defina JWT_SECRET no .env (copie de .env.example)}
      - KAFKA_BROKER=kafka:29092               # publica match-completed (item 4)
      - MATCH_TOPIC=match-completed
    ports:
      - "${ENGINE3_PORT:-4003}:4003"
    depends_on:
      - kafka
    restart: unless-stopped

  # Score Service (Python) — consome match-completed do Kafka, materializa o
  # ranking no Redis e o histórico no PostgreSQL; expõe GET /api/scores (itens 4, 5, 6).
  score-service:
    build:
      context: ./score-service
      dockerfile: Dockerfile
    container_name: spaceship_score
    environment:
      - SCORE_PORT=8000
      - KAFKA_BROKER=kafka:29092
      - MATCH_TOPIC=match-completed
      - KAFKA_GROUP=score-service
      - REDIS_URL=redis://redis:6379/0
      - PG_HOST=postgres
      - PG_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-authdb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env (copie de .env.example)}
    ports:
      - "${SCORE_PORT:-8000}:8000"
    depends_on:
      - kafka
      - redis
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spaceship_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
